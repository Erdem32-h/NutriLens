workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    # mac_mini_m2 requires a paid Codemagic plan; m1 is included in
    # all tiers and builds iOS Flutter apps just fine (5-10 min slower).
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        # List form so Codemagic creates/fetches profiles for BOTH
        # targets at clone time, regardless of whether the widget is
        # already present in pbxproj (the Ruby script below adds it
        # if missing). Without the widget entry here, the workflow's
        # auto-signing only handles the first bundle ID and the
        # widget archive step later fails with "requires a
        # provisioning profile" / "doesn't include App Groups".
        bundle_identifier:
          - app.nutrilens.ios
          - app.nutrilens.ios.NutriLensHomeWidget
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: app.nutrilens.ios
    scripts:
      - name: Create .env
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
          echo "RC_API_KEY_IOS=$RC_API_KEY_IOS" >> .env
          echo "RC_API_KEY_ANDROID=$RC_API_KEY_ANDROID" >> .env
          echo "ADMOB_APP_ID=$ADMOB_APP_ID_IOS" >> .env
          echo "ADMOB_BANNER_IOS=$ADMOB_BANNER_IOS" >> .env
          echo "ADMOB_REWARDED_IOS=$ADMOB_REWARDED_IOS" >> .env
          echo "PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL" >> .env
          echo "TERMS_OF_USE_URL=$TERMS_OF_USE_URL" >> .env
      - name: Disable Swift Package Manager
        # google_mobile_ads is CocoaPods-only and depends on
        # webview_flutter_wkwebview, which Flutter's auto-SPM integration
        # tries to resolve via SPM. The two collide and `pod install`
        # fails with "Unable to find a specification for
        # webview_flutter_wkwebview". Until google_mobile_ads ships an
        # SPM manifest we force the whole project onto CocoaPods.
        # See: https://docs.flutter.dev/packages-and-plugins/swift-package-manager/for-app-developers#how-to-turn-off-swift-package-manager
        script: flutter config --no-enable-swift-package-manager
      - name: Flutter pub get
        script: flutter pub get
      - name: Code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Ensure Widget Extension target in Runner.xcodeproj
        # Idempotent safety net: the widget target is COMMITTED in the
        # repo's pbxproj (see tools/setup_widget_target.ps1) so the
        # `ios_signing` env block at the top of this workflow can see
        # both bundle IDs at clone time and auto-create profiles for
        # both. This script is a no-op when the target already exists;
        # it only re-runs if pbxproj somehow lost the target (e.g.
        # accidental revert) so the build still succeeds.
        script: |
          cd ios
          gem install xcodeproj --no-document
          ruby scripts/add_widget_target.rb Runner.xcodeproj
      - name: Set up iOS code signing
        # `ios_signing` env block + workflow-level app_store_connect
        # integration handled cert+profile fetch automatically at
        # clone time (for ALL bundle IDs in pbxproj). Here we just
        # patch the pbxproj to point each target at its downloaded
        # profile.
        script: xcode-project use-profiles
      - name: Configure iOS build settings
        script: |
          # IMPORTANT: do NOT append to Generated.xcconfig — `flutter build`
          # regenerates that file at build start and our changes get wiped.
          # Release.xcconfig is user-managed; overwrite it with a known-good
          # template that includes ADMOB_APP_ID (real value when env var is
          # set, Google test ID otherwise so the iOS SDK doesn't crash).
          ADMOB_VALUE="${ADMOB_APP_ID_IOS:-ca-app-pub-3940256099942544~1458002511}"
          cat > ios/Flutter/Release.xcconfig <<EOF
          #include "Generated.xcconfig"
          ADMOB_APP_ID = ${ADMOB_VALUE}
          EOF
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=ADMOB_APP_ID_IOS=$ADMOB_APP_ID_IOS \
            --dart-define=ADMOB_BANNER_IOS=$ADMOB_BANNER_IOS \
            --dart-define=ADMOB_REWARDED_IOS=$ADMOB_REWARDED_IOS \
            --dart-define=PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL \
            --dart-define=TERMS_OF_USE_URL=$TERMS_OF_USE_URL \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-internal:
    name: Android Internal Testing
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        - nutrilens_keystore
      flutter: stable
      vars:
        BUNDLE_ID: com.nutrilensapp.android
    scripts:
      - name: Create .env
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
          echo "RC_API_KEY_ANDROID=$RC_API_KEY_ANDROID" >> .env
          echo "RC_API_KEY_IOS=$RC_API_KEY_IOS" >> .env
          echo "ADMOB_APP_ID=$ADMOB_APP_ID_ANDROID" >> .env
          echo "ADMOB_BANNER_ANDROID=$ADMOB_BANNER_ANDROID" >> .env
          echo "ADMOB_REWARDED_ANDROID=$ADMOB_REWARDED_ANDROID" >> .env
          echo "PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL" >> .env
          echo "TERMS_OF_USE_URL=$TERMS_OF_USE_URL" >> .env
      - name: Flutter pub get
        script: flutter pub get
      - name: Code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=ADMOB_BANNER_ANDROID=$ADMOB_BANNER_ANDROID \
            --dart-define=ADMOB_REWARDED_ANDROID=$ADMOB_REWARDED_ANDROID \
            --dart-define=PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL \
            --dart-define=TERMS_OF_USE_URL=$TERMS_OF_USE_URL
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false

  android-maestro:
    name: Android Maestro E2E
    # Triggered manually (no `triggering:` block). Use it as a smoke
    # check before promoting an Android build to internal testing.
    max_build_duration: 45
    instance_type: linux_x2
    environment:
      flutter: stable
      vars:
        # Required: a dedicated test account in Supabase auth — does not
        # need premium, just real credentials the app can log in with.
        # Defined as encrypted variables in Codemagic.
        MAESTRO_TEST_EMAIL: $MAESTRO_TEST_EMAIL
        MAESTRO_TEST_PASSWORD: $MAESTRO_TEST_PASSWORD
    scripts:
      - name: Create .env
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
          echo "RC_API_KEY_ANDROID=$RC_API_KEY_ANDROID" >> .env
          echo "PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL" >> .env
          echo "TERMS_OF_USE_URL=$TERMS_OF_USE_URL" >> .env
      - name: Flutter pub get + codegen
        script: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
      - name: Build debug APK
        # Debug build is enough for E2E and avoids signing complexity.
        script: flutter build apk --debug
      - name: Install Maestro CLI
        script: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH":"$HOME/.maestro/bin"
          maestro --version
      - name: Start Android emulator
        script: |
          # Codemagic linux_x2 ships KVM-enabled AVDs.
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "system-images;android-33;google_apis;x86_64"
          echo no | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager create avd -n maestro -k "system-images;android-33;google_apis;x86_64" -f
          $ANDROID_SDK_ROOT/emulator/emulator -avd maestro -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect &
          $ANDROID_SDK_ROOT/platform-tools/adb wait-for-device
          # Wait for boot to complete (sysboot.completed=1).
          until [ "$($ANDROID_SDK_ROOT/platform-tools/adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do
            sleep 2
          done
      - name: Install APK on emulator
        script: |
          $ANDROID_SDK_ROOT/platform-tools/adb install -r build/app/outputs/flutter-apk/app-debug.apk
      - name: Run Maestro flows
        script: |
          export PATH="$PATH":"$HOME/.maestro/bin"
          maestro test maestro/flows \
            -e MAESTRO_TEST_EMAIL="$MAESTRO_TEST_EMAIL" \
            -e MAESTRO_TEST_PASSWORD="$MAESTRO_TEST_PASSWORD"
    artifacts:
      - ~/.maestro/tests/**
      - build/app/outputs/flutter-apk/app-debug.apk
