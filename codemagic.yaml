workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.nutrilens.ios
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: app.nutrilens.ios
    scripts:
      - name: Create .env
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
          echo "RC_API_KEY_IOS=$RC_API_KEY_IOS" >> .env
          echo "RC_API_KEY_ANDROID=$RC_API_KEY_ANDROID" >> .env
          echo "ADMOB_APP_ID=$ADMOB_APP_ID_IOS" >> .env
      - name: Flutter pub get
        script: flutter pub get
      - name: Code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Set up iOS code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: flutter build ipa --release --build-number=$BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-internal:
    name: Android Internal Testing
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        - nutrilens_keystore
      flutter: stable
      vars:
        BUNDLE_ID: com.nutrilensapp.android
    scripts:
      - name: Create .env
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
          echo "RC_API_KEY_ANDROID=$RC_API_KEY_ANDROID" >> .env
          echo "RC_API_KEY_IOS=$RC_API_KEY_IOS" >> .env
          echo "ADMOB_APP_ID=$ADMOB_APP_ID_ANDROID" >> .env
      - name: Flutter pub get
        script: flutter pub get
      - name: Code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Build AAB
        script: flutter build appbundle --release --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false
