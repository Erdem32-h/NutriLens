workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    # mac_mini_m2 requires a paid Codemagic plan; m1 is included in
    # all tiers and builds iOS Flutter apps just fine (5-10 min slower).
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - MyGroup
      ios_signing:
        distribution_type: app_store
        # Main bundle only — Codemagic's schema requires a string here.
        # The widget extension profile is fetched in an explicit script
        # step below, using the cert that this integration provisioned.
        bundle_identifier: app.nutrilens.ios
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: app.nutrilens.ios
    scripts:
      - name: Create .env
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
          echo "RC_API_KEY_IOS=$RC_API_KEY_IOS" >> .env
          echo "RC_API_KEY_ANDROID=$RC_API_KEY_ANDROID" >> .env
          echo "ADMOB_APP_ID=$ADMOB_APP_ID_IOS" >> .env
          echo "ADMOB_BANNER_IOS=$ADMOB_BANNER_IOS" >> .env
          echo "ADMOB_REWARDED_IOS=$ADMOB_REWARDED_IOS" >> .env
          echo "PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL" >> .env
          echo "TERMS_OF_USE_URL=$TERMS_OF_USE_URL" >> .env
      - name: Disable Swift Package Manager
        # google_mobile_ads is CocoaPods-only and depends on
        # webview_flutter_wkwebview, which Flutter's auto-SPM integration
        # tries to resolve via SPM. The two collide and `pod install`
        # fails with "Unable to find a specification for
        # webview_flutter_wkwebview". Until google_mobile_ads ships an
        # SPM manifest we force the whole project onto CocoaPods.
        # See: https://docs.flutter.dev/packages-and-plugins/swift-package-manager/for-app-developers#how-to-turn-off-swift-package-manager
        script: flutter config --no-enable-swift-package-manager
      - name: Flutter pub get
        script: flutter pub get
      - name: Code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Add Widget Extension target to Runner.xcodeproj
        # Idempotent: only creates the widget target if not already
        # present. Must run BEFORE the explicit fetch-signing-files
        # step below so use-profiles can find the widget target.
        script: |
          cd ios
          gem install xcodeproj --no-document
          ruby scripts/add_widget_target.rb Runner.xcodeproj
      - name: Create provisioning profile for widget extension
        # The workflow's `ios_signing` env block fetched cert + profile
        # for app.nutrilens.ios, but that profile can be stale and miss
        # App Groups after the widget was added. The widget bundle ID is
        # separate too, and the high-level `fetch-signing-files` command
        # would fail here because it insists on a --certificate-key (the
        # integration keeps the key in keychain only, not as an env var).
        #
        # We bypass that by using lower-level subcommands that don't
        # touch the certificate private key at all — only the profile:
        #   1. `certificates list` → find existing cert resource ID
        #   2. `bundle-ids list`   → find main + widget bundle resources
        #   3. ensure App Groups capability is enabled on both IDs
        #   4. `profiles create ... --save` → create + download profiles
        script: |
          set -euo pipefail

          # No --type filter: Apple uses 'DISTRIBUTION' (modern generic
          # iOS+macOS+tvOS cert) or 'IOS_DISTRIBUTION' (legacy iOS-only).
          # Filter in Python to accept either; prefer DISTRIBUTION when
          # both exist.
          CERT_ID=$(app-store-connect certificates list --json \
            | python3 -c "import sys,json; c=json.load(sys.stdin); d=[x for x in c if x.get('attributes',{}).get('certificateType') in ('DISTRIBUTION','IOS_DISTRIBUTION')]; d.sort(key=lambda x: 0 if x['attributes']['certificateType']=='DISTRIBUTION' else 1); print(d[0]['id'] if d else '')")
          if [ -z "$CERT_ID" ]; then
            echo "::error:: No DISTRIBUTION or IOS_DISTRIBUTION certificate found in App Store Connect. Available types:"
            app-store-connect certificates list --json \
              | python3 -c "import sys,json; [print('  -',c.get('attributes',{}).get('certificateType','?'),c.get('id','?')) for c in json.load(sys.stdin)]"
            exit 1
          fi
          echo "Distribution cert resource: $CERT_ID"

          MAIN_BID=$(app-store-connect bundle-ids list \
            --bundle-id-identifier app.nutrilens.ios \
            --json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else '')")
          if [ -z "$MAIN_BID" ]; then
            echo "::error:: Main bundle ID app.nutrilens.ios not registered in Apple Developer Portal"
            exit 1
          fi
          echo "Main bundle resource: $MAIN_BID"

          WIDGET_BID=$(app-store-connect bundle-ids list \
            --bundle-id-identifier app.nutrilens.ios.NutriLensHomeWidget \
            --json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else '')")
          if [ -z "$WIDGET_BID" ]; then
            echo "::error:: Widget bundle ID app.nutrilens.ios.NutriLensHomeWidget not registered in Apple Developer Portal"
            exit 1
          fi
          echo "Widget bundle resource: $WIDGET_BID"

          for bid in "$MAIN_BID" "$WIDGET_BID"; do
            echo "Ensuring App Groups capability for bundle resource: $bid"
            app-store-connect bundle-ids enable-capabilities "$bid" \
              --capability "App Groups" || true
          done

          # Delete stale profiles by exact name so duplicate widget
          # profiles do not make `profiles create` fail with 409.
          delete_profiles_by_name() {
            local profile_name="$1"
            local stale_ids
            stale_ids=$(app-store-connect profiles list \
              --type IOS_APP_STORE \
              --name "$profile_name" \
              --json \
              | python3 -c "import sys,json; print('\n'.join(p['id'] for p in json.load(sys.stdin)))")
            for pid in $stale_ids; do
              echo "Deleting stale App Store profile '$profile_name': $pid"
              yes | app-store-connect profiles delete "$pid" --ignore-not-found || true
            done
          }

          delete_profiles_by_name "NutriLens App Store"
          delete_profiles_by_name "NutriLensHomeWidget App Store"
          delete_profiles_by_name "NutriLens Home Widget"

          # Create fresh profiles, then save them to the default
          # provisioning profiles directory for xcode-project use-profiles.
          app-store-connect profiles create \
            "$MAIN_BID" \
            --type IOS_APP_STORE \
            --name "NutriLens App Store" \
            --certificate-ids "$CERT_ID" \
            --save
          app-store-connect profiles create \
            "$WIDGET_BID" \
            --type IOS_APP_STORE \
            --name "NutriLensHomeWidget App Store" \
            --certificate-ids "$CERT_ID" \
            --save
      - name: Set up iOS code signing
        script: xcode-project use-profiles
      - name: Configure iOS build settings
        script: |
          # IMPORTANT: do NOT append to Generated.xcconfig — `flutter build`
          # regenerates that file at build start and our changes get wiped.
          # Release.xcconfig is user-managed; overwrite it with a known-good
          # template that includes ADMOB_APP_ID (real value when env var is
          # set, Google test ID otherwise so the iOS SDK doesn't crash).
          ADMOB_VALUE="${ADMOB_APP_ID_IOS:-ca-app-pub-3940256099942544~1458002511}"
          cat > ios/Flutter/Release.xcconfig <<EOF
          #include "Generated.xcconfig"
          ADMOB_APP_ID = ${ADMOB_VALUE}
          EOF
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=ADMOB_APP_ID_IOS=$ADMOB_APP_ID_IOS \
            --dart-define=ADMOB_BANNER_IOS=$ADMOB_BANNER_IOS \
            --dart-define=ADMOB_REWARDED_IOS=$ADMOB_REWARDED_IOS \
            --dart-define=PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL \
            --dart-define=TERMS_OF_USE_URL=$TERMS_OF_USE_URL \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Validate IPA bundle structure
        script: |
          set -euo pipefail
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n 1)
          TMP_DIR=$(mktemp -d)
          unzip -q "$IPA_PATH" -d "$TMP_DIR"
          WIDGET_DIR="$TMP_DIR/Payload/Runner.app/PlugIns/NutriLensHomeWidget.appex"
          if [ ! -d "$WIDGET_DIR" ]; then
            echo "::error:: NutriLensHomeWidget.appex is missing from Runner.app/PlugIns"
            find "$TMP_DIR/Payload/Runner.app" -maxdepth 3 -type d | sort
            exit 1
          fi
          echo "Embedded widget bundle: $WIDGET_DIR"
          /usr/libexec/PlistBuddy -c "Print :CFBundlePackageType" "$WIDGET_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$WIDGET_DIR/Info.plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundlePackageType' "$WIDGET_DIR/Info.plist")" = "XPC!"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-internal:
    name: Android Internal Testing
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - MyGroup
      android_signing:
        - nutrilens_keystore
      flutter: stable
      vars:
        BUNDLE_ID: com.nutrilensapp.android
    scripts:
      - name: Create .env
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
          echo "RC_API_KEY_ANDROID=$RC_API_KEY_ANDROID" >> .env
          echo "RC_API_KEY_IOS=$RC_API_KEY_IOS" >> .env
          echo "ADMOB_APP_ID=$ADMOB_APP_ID_ANDROID" >> .env
          echo "ADMOB_BANNER_ANDROID=$ADMOB_BANNER_ANDROID" >> .env
          echo "ADMOB_REWARDED_ANDROID=$ADMOB_REWARDED_ANDROID" >> .env
          echo "PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL" >> .env
          echo "TERMS_OF_USE_URL=$TERMS_OF_USE_URL" >> .env
      - name: Flutter pub get
        script: flutter pub get
      - name: Code generation
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=ADMOB_BANNER_ANDROID=$ADMOB_BANNER_ANDROID \
            --dart-define=ADMOB_REWARDED_ANDROID=$ADMOB_REWARDED_ANDROID \
            --dart-define=PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL \
            --dart-define=TERMS_OF_USE_URL=$TERMS_OF_USE_URL
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/mapping/release/mapping.txt
    # Play Console publishing is currently manual: download the AAB
    # artifact from Codemagic and upload via Play Console → Internal
    # testing → New release. Enabling auto-publish only requires
    # putting GCLOUD_SERVICE_ACCOUNT_CREDENTIALS back into MyGroup and
    # un-commenting the block below.
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: false

  android-maestro:
    name: Android Maestro E2E
    # Triggered manually (no `triggering:` block). Use it as a smoke
    # check before promoting an Android build to internal testing.
    max_build_duration: 45
    instance_type: linux_x2
    environment:
      groups:
        - MyGroup
      flutter: stable
      vars:
        # Required: a dedicated test account in Supabase auth — does not
        # need premium, just real credentials the app can log in with.
        # Defined as encrypted variables in Codemagic.
        MAESTRO_TEST_EMAIL: $MAESTRO_TEST_EMAIL
        MAESTRO_TEST_PASSWORD: $MAESTRO_TEST_PASSWORD
    scripts:
      - name: Create .env
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
          echo "RC_API_KEY_ANDROID=$RC_API_KEY_ANDROID" >> .env
          echo "PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL" >> .env
          echo "TERMS_OF_USE_URL=$TERMS_OF_USE_URL" >> .env
      - name: Flutter pub get + codegen
        script: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
      - name: Build debug APK
        # Debug build is enough for E2E and avoids signing complexity.
        script: flutter build apk --debug
      - name: Install Maestro CLI
        script: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH":"$HOME/.maestro/bin"
          maestro --version
      - name: Start Android emulator
        script: |
          # Codemagic linux_x2 ships KVM-enabled AVDs.
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "system-images;android-33;google_apis;x86_64"
          echo no | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager create avd -n maestro -k "system-images;android-33;google_apis;x86_64" -f
          $ANDROID_SDK_ROOT/emulator/emulator -avd maestro -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect &
          $ANDROID_SDK_ROOT/platform-tools/adb wait-for-device
          # Wait for boot to complete (sysboot.completed=1).
          until [ "$($ANDROID_SDK_ROOT/platform-tools/adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do
            sleep 2
          done
      - name: Install APK on emulator
        script: |
          $ANDROID_SDK_ROOT/platform-tools/adb install -r build/app/outputs/flutter-apk/app-debug.apk
      - name: Run Maestro flows
        script: |
          export PATH="$PATH":"$HOME/.maestro/bin"
          maestro test maestro/flows \
            -e MAESTRO_TEST_EMAIL="$MAESTRO_TEST_EMAIL" \
            -e MAESTRO_TEST_PASSWORD="$MAESTRO_TEST_PASSWORD"
    artifacts:
      - ~/.maestro/tests/**
      - build/app/outputs/flutter-apk/app-debug.apk
