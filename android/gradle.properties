org.gradle.jvmargs=-Xmx6G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC
android.useAndroidX=true
# Jetifier was used during the AndroidX migration to rewrite legacy
# support-lib references inside plugins. All current dependencies are
# native AndroidX, so jetifier just burns CPU/RAM. Re-enable if a
# plugin upgrade brings back a non-migrated transitive dependency.
android.enableJetifier=false
