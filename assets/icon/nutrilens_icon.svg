<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep forest green to vibrant green -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#072A12"/>
      <stop offset="45%" stop-color="#0F4A24"/>
      <stop offset="100%" stop-color="#1A7A3A"/>
    </linearGradient>
    <!-- Subtle radial glow behind leaf -->
    <radialGradient id="glow" cx="0.5" cy="0.44" r="0.42">
      <stop offset="0%" stop-color="#2EAD5E" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#072A12" stop-opacity="0"/>
    </radialGradient>
    <!-- Scan line horizontal fade -->
    <linearGradient id="scanGrad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0"/>
      <stop offset="12%" stop-color="#4ADE80" stop-opacity="0.85"/>
      <stop offset="88%" stop-color="#4ADE80" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4ADE80" stop-opacity="0"/>
    </linearGradient>
    <!-- Scan glow filter -->
    <filter id="scanGlow" x="-10%" y="-300%" width="120%" height="700%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
    <!-- Leaf subtle shadow -->
    <filter id="leafShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#glow)"/>

  <!-- === LEAF === -->
  <path d="M 512 195
           C 648 275, 718 405, 718 500
           C 718 625, 628 735, 512 768
           C 396 735, 306 625, 306 500
           C 306 405, 376 275, 512 195 Z"
        fill="white" fill-opacity="0.94" filter="url(#leafShadow)"/>

  <!-- Leaf center vein -->
  <line x1="512" y1="268" x2="512" y2="706"
        stroke="#0F4A24" stroke-width="5.5" stroke-opacity="0.16" stroke-linecap="round"/>

  <!-- Leaf side veins (3 pairs) -->
  <path d="M 512 370 Q 462 342 406 358" stroke="#0F4A24" stroke-width="3.5"
        stroke-opacity="0.11" fill="none" stroke-linecap="round"/>
  <path d="M 512 370 Q 562 342 618 358" stroke="#0F4A24" stroke-width="3.5"
        stroke-opacity="0.11" fill="none" stroke-linecap="round"/>

  <path d="M 512 475 Q 454 448 374 472" stroke="#0F4A24" stroke-width="3.5"
        stroke-opacity="0.11" fill="none" stroke-linecap="round"/>
  <path d="M 512 475 Q 570 448 650 472" stroke="#0F4A24" stroke-width="3.5"
        stroke-opacity="0.11" fill="none" stroke-linecap="round"/>

  <path d="M 512 578 Q 462 554 394 575" stroke="#0F4A24" stroke-width="3.5"
        stroke-opacity="0.11" fill="none" stroke-linecap="round"/>
  <path d="M 512 578 Q 562 554 630 575" stroke="#0F4A24" stroke-width="3.5"
        stroke-opacity="0.11" fill="none" stroke-linecap="round"/>

  <!-- === SCAN LINE === -->
  <!-- Outer glow -->
  <line x1="140" y1="485" x2="884" y2="485"
        stroke="url(#scanGrad)" stroke-width="24" filter="url(#scanGlow)"/>
  <!-- Inner bright line -->
  <line x1="140" y1="485" x2="884" y2="485"
        stroke="url(#scanGrad)" stroke-width="4.5"/>

  <!-- Tiny scan dots at intersections -->
  <circle cx="306" cy="485" r="4" fill="#4ADE80" fill-opacity="0.6"/>
  <circle cx="718" cy="485" r="4" fill="#4ADE80" fill-opacity="0.6"/>
</svg>
