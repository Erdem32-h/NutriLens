name: nutrilens
description: "KlikTag-inspired food barcode scanner with health scoring, additive analysis, and personalized dietary filtering."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.8.0

  # Local Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # Code Generation (annotations)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Barcode Scanning
  mobile_scanner: ^7.0.1

  # Food Data
  openfoodfacts: ^3.15.0

  # Networking & Connectivity
  connectivity_plus: ^6.1.4
  dio: ^5.7.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  equatable: ^2.0.7
  fpdart: ^1.1.0
  logger: ^2.5.0
  path: ^1.9.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1

  # Testing
  mocktail: ^1.0.4

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/additives/
    - assets/images/
