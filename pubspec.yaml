name: nutrilens
description: "KlikTag-inspired food barcode scanner with health scoring, additive analysis, and personalized dietary filtering."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.1.0

  # Backend
  supabase_flutter: ^2.8.0

  # Local Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.0

  # Code Generation (annotations)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Barcode Scanning
  mobile_scanner: ^7.0.1

  # Food Data
  openfoodfacts: ^3.15.0

  # Networking & Connectivity
  connectivity_plus: ^7.0.0
  dio: ^5.7.0

  # UI
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5
  equatable: ^2.0.7
  fpdart: ^1.1.0
  logger: ^2.5.0
  path: ^1.9.1
  flutter_dotenv: ^6.0.0
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.2.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.3
  drift_dev: ^2.22.1

  # Testing
  mocktail: ^1.0.4

  # Linting
  flutter_lints: ^6.0.0

  # App Icon
  flutter_launcher_icons: ^0.14.3

  supabase: any
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/nutrilens_icon_1024.png"
  adaptive_icon_foreground: "assets/icon/nutrilens_foreground_1024.png"
  adaptive_icon_background: "#072A12"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/nutrilens_icon_1024.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/additives/
    - assets/images/
