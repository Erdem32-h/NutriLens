name: CI

# Runs on every push and PR. Codemagic owns the heavy lifting (release
# IPA/AAB with code signing). This workflow stays fast (~3-5 min) so
# it can gate every commit without slowing the loop.
#
# What it does:
#   1. Stub .env (tests don't need real secrets but dotenv must load)
#   2. `flutter pub get`
#   3. Drift / Riverpod / Freezed codegen
#   4. l10n regenerate
#   5. `dart format` strict
#   6. `flutter analyze --fatal-infos`
#   7. `flutter test --coverage`
#   8. Coverage report attached as PR artifact (no hard threshold yet)
#   9. gitleaks secret scan across full history

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.5'

jobs:
  analyze-and-test:
    name: Analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Stub .env (CI has no secrets baked in)
        # Tests don't talk to Supabase / Anthropic / RevenueCat — they
        # pass empty values through flutter_dotenv. Without this file
        # the asset loader fails on first test run because pubspec
        # declares `.env` as an asset.
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=
          SUPABASE_ANON_KEY=
          ANTHROPIC_API_KEY=
          RC_API_KEY_ANDROID=
          RC_API_KEY_IOS=
          ADMOB_APP_ID=
          ADMOB_BANNER_ANDROID=
          ADMOB_REWARDED_ANDROID=
          ADMOB_BANNER_IOS=
          ADMOB_REWARDED_IOS=
          PRIVACY_POLICY_URL=https://erdem32-h.github.io/NutriLens/privacy.html
          TERMS_OF_USE_URL=https://www.apple.com/legal/internet-services/itunes/dev/stdeula/
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: Generate code (drift / riverpod / freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        run: flutter gen-l10n

      - name: dart format check
        run: dart format --output=none --set-exit-if-changed lib test

      - name: flutter analyze
        run: flutter analyze --no-pub --fatal-infos

      - name: flutter test (with coverage)
        run: flutter test --coverage --reporter=expanded

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            total=$(grep -E '^DA:' coverage/lcov.info | wc -l)
            covered=$(grep -E '^DA:[0-9]+,[1-9]' coverage/lcov.info | wc -l)
            if [ "$total" -gt 0 ]; then
              pct=$(awk "BEGIN { printf \"%.1f\", ($covered/$total)*100 }")
              echo "### Line coverage: \`$pct%\` ($covered / $total)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Coverage threshold (soft — warn only)
        if: always()
        # No hard fail yet. The test suite is being built up; gating
        # below 80% would block every PR until backlog is filled. Raise
        # the floor below in steps: 30 → 50 → 70 → 80 as coverage grows.
        run: |
          sudo apt-get install -y lcov >/dev/null
          PCT=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oP '\d+\.\d+(?=%)' | head -1)
          THRESHOLD=30
          echo "Line coverage: ${PCT}% (soft threshold: ${THRESHOLD}%)"
          awk "BEGIN { exit !($PCT >= $THRESHOLD) }" || {
            echo "::warning::Coverage ${PCT}% is below soft threshold ${THRESHOLD}%"
          }

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan every commit, not just
          # the surface tree. fetch-depth: 0 disables shallow clone.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          # Skip the GITLEAKS_LICENSE check for open-source repos:
          GITLEAKS_NOTIFY_USER_LIST: ''
